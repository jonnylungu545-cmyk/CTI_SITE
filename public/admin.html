<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Panou Incarcare Foto</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="max-w-2xl mx-auto mt-10 p-8 bg-white rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Creează Galerie Nouă</h1>
        
        <form id="uploadForm" class="space-y-4">
            <!-- Detalii Client -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Nume Client (Login)</label>
                <input type="text" id="username" name="username" required 
                    class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Parolă Client</label>
                <input type="password" id="password" name="password" required 
                    class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm">
            </div>

            <hr class="my-6">

            <!-- Selecție Poze -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Selectează Pozele (Max 50 deodată)</label>
                <input type="file" id="photos" name="photos" multiple accept="image/*" required
                    class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200">
                Lansează Galeria
            </button>
        </form>

        <!-- Status -->
        <div id="status" class="mt-4 hidden p-3 rounded-md"></div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const status = document.getElementById('status');
        const btn = document.getElementById('submitBtn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Se încarcă... te rog așteaptă";
            status.classList.remove('hidden');
            status.className = "mt-4 p-3 rounded-md bg-blue-100 text-blue-700";
            status.innerText = "Pregătim pozele pentru Google Drive...";

            const formData = new FormData(form);

            try {
                // Aici va fi adresa serverului tau de pe Render
                const response = await fetch('/upload-gallery', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    status.className = "mt-4 p-3 rounded-md bg-green-100 text-green-700";
                    status.innerText = "Succes! Galeria a fost creată și va expira în 60 de zile.";
                    form.reset();
                } else {
                    throw new Error('Eroare la server');
                }
            } catch (err) {
                status.className = "mt-4 p-3 rounded-md bg-red-100 text-red-700";
                status.innerText = "A apărut o eroare. Verifică consola.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Lansează Galeria";
            }
        };
    </script>
</body>
</html>
