<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acces Galerie Foto</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full p-8 bg-gray-900 rounded-xl shadow-2xl border border-gray-800">
        <h1 class="text-3xl font-serif text-center mb-8">Vizualizare Galerie</h1>
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm text-gray-400">Nume utilizator</label>
                <input type="text" id="username" required class="w-full bg-gray-800 border border-gray-700 rounded p-3 mt-1 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400">Parolă</label>
                <input type="password" id="password" required class="w-full bg-gray-800 border border-gray-700 rounded p-3 mt-1 focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-white text-black font-bold py-3 rounded hover:bg-gray-200 transition">
                Accesează Pozele
            </button>
        </form>
        <p id="error" class="text-red-500 mt-4 text-center hidden">Date incorecte!</p>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Salvăm temporar datele ca să le folosim în pagina următoare
            sessionStorage.setItem('user', username);
            sessionStorage.setItem('pass', password);
            
            window.location.href = '/view.html';
        };
    </script>
</body>
</html>
